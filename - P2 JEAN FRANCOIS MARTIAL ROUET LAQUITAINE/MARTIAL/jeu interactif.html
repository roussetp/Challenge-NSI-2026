<h1>🌴 Jeu : Trouve les lieux de Guadeloupe</h1>

<div id="game">
    Trouve : <b id="target"></b>
    <br>
    Score : <span id="score">0</span>
    <br>
    <button onclick="nouveauLieu()">Nouveau lieu</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// création carte
const map = L.map('map').setView([16.25,-61.55],9);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:18
}).addTo(map);

// lieux à trouver
const lieux = [
    {name:"Pointe des Châteaux", lat:16.245, lng:-61.175},
    {name:"La Soufrière", lat:16.044, lng:-61.664},
    {name:"Basse-Terre", lat:15.998, lng:-61.732},
    {name:"Grande Anse (Deshaies)", lat:16.307, lng:-61.793},
    {name:"Les Saintes", lat:15.864, lng:-61.581},
    {name:"Marie-Galante", lat:15.93, lng:-61.27},
    {name:"La Désirade", lat:16.32, lng:-61.05}
];

let lieuActuel = null;
let score = 0;
let marker;

// choisir un lieu
function nouveauLieu(){
    const random = Math.floor(Math.random()*lieux.length);
    lieuActuel = lieux[random];
    document.getElementById("target").textContent = lieuActuel.name;
}

// calcul distance
function distance(lat1, lon1, lat2, lon2){
    const R = 6371;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;
    const a =
        Math.sin(dLat/2)*Math.sin(dLat/2)+
        Math.cos(lat1*Math.PI/180)*
        Math.cos(lat2*Math.PI/180)*
        Math.sin(dLon/2)*Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    return R*c;
}

// clic sur la carte
map.on("click", function(e){
    if(!lieuActuel) return;

    if(marker){
        map.removeLayer(marker);
    }

    marker = L.marker(e.latlng).addTo(map);

    const d = distance(
        e.latlng.lat,
        e.latlng.lng,
        lieuActuel.lat,
        lieuActuel.lng
    );

    let points = Math.max(0,100 - Math.floor(d*5));
    score += points;

    document.getElementById("score").textContent = score;

    alert(
        "Distance : " + d.toFixed(2) + " km\n" +
        "Points gagnés : " + points
    );
});

// premier lieu
nouveauLieu();
</script>
